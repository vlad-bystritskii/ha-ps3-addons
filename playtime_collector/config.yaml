name: Playtime Collector
version: "0.7.1"
slug: playtime_collector
description: Track PS3 (webMAN MOD) playtime and trophies and expose them over a JSON API
url: https://github.com/vlad-bystritskii/ha-ps3-addons
arch:
  - amd64
  - aarch64
init: false
boot: auto
webui: "http://[HOST]:[PORT:3301]/"
ports:
  "3301/tcp": 3301
ports_description:
  "3301/tcp": JSON API
map:
  - data:rw
options:
  ps3_host: ""
  playtime_source: "auto"
  poll_interval: 30
  trophy_interval: 1800
  account: "ps3"
  ignore_accounts: "Vlad"
  auth_token: ""
  psn_npsso: ""
schema:
  ps3_host: str
  playtime_source: "list(auto|webman|plugin)"
  poll_interval: int
  trophy_interval: int
  account: str
  ignore_accounts: str
  auth_token: str
  psn_npsso: "password?"
